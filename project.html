  <script>
    /* cover before first paint when arriving via an internal link — and,
       on a visitor's very first arrival, play that same curtain + logo
       loader once as a preloader (persisted per browser in localStorage) */
    try {
      var __pt = +sessionStorage.getItem("pt") || 0;
      if (__pt) sessionStorage.removeItem("pt");
      var __cover = !!(__pt && Date.now() - __pt < 15000);
      if (!__cover && !localStorage.getItem("tl-visited")) {
        localStorage.setItem("tl-visited", String(Date.now()));
        __cover = true;
      }
      if (__cover) {
        document.documentElement.classList.add("pt-cover");
        window.__ptCoverAt = Date.now();
      }
    } catch (e) {}
  </script>
